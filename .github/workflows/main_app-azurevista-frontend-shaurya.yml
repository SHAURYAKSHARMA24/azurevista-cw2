name: Build and deploy frontend to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: app-azurevista-frontend-shaurya
  NODE_VERSION: "22"

jobs:
  build:
    name: Build frontend package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Prepare App Service package
        run: |
          mkdir frontend-deploy
          cp frontend/package.json frontend/package-lock.json frontend/server.cjs frontend-deploy/
          cp -r frontend/dist frontend-deploy/dist

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-appservice-package
          path: frontend-deploy

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-appservice-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0D685B7683D944BF8CFC19C0939DB717 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8B4BDAD19EA3406FB575E1EE41621613 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_01711A478A3D4170A6AC2A69DE8EE6B5 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: .
